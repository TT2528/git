  <!-- 联系页面 -->
  <section class="contact">
    <div class="contact__layout">

      <!-- 左侧：联系信息 + 社交链接 -->
      <div class="contact__info reveal-section">
        <h1>联系</h1>
        <p>
          如你对作品合作、展览邀约或创作对话感兴趣，
          请通过下方表单留言，或经由社交平台与我取得联系。
          我通常在一周内回复。
        </p>

        <div class="contact__social">
          <a href="#" class="contact__social-link" aria-label="微信">
            <span class="contact__social-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="3"/>
                <circle cx="12" cy="12" r="3"/>
                <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
              </svg>
            </span>
            WeChat · nine999art
          </a>

          <a href="mailto:eshsb666@qq.com" class="contact__social-link" aria-label="QQ邮箱">
            <span class="contact__social-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M22 4L12 13 2 4"/>
              </svg>
            </span>
            QQ Email · eshsb666@qq.com
          </a>
        </div>
      </div>

      <!-- 右侧：联系表单 -->
      <form class="contact__form reveal-text" action="https://formsubmit.co/eshsb666@qq.com" method="POST">
        <input type="hidden" name="_next" value="https://nine999art.com/thank-you.html">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="text" name="_honey" style="display:none">

        <div class="form-group">
          <label class="form-label" for="name">姓名</label>
          <input class="form-input" type="text" id="name" name="name" placeholder="你的名字" autocomplete="name" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">邮箱</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="message">留言</label>
          <textarea class="form-input" id="message" name="message" placeholder="写下你想说的……" required></textarea>
        </div>

        <button type="submit" class="form-submit">发送留言</button>
      </form>

    </div>
  </section>

  <!-- 页脚 -->
