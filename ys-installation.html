    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    #canvas-container { width: 100vw; height: 100vh; display: block; touch-action: none; cursor: grab; }
    #canvas-container:active { cursor: grabbing; }

    #back {
      position: fixed; left: 22px; top: 20px; z-index: 998;

      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif; text-transform: uppercase;

    }
    #back:hover { color: #fff; border-color: rgba(255,255,255,.4); }
    /* 左下角署名 */
    #credit {
      position: fixed; left: 22px; bottom: 18px; z-index: 998;
      color: rgba(255,255,255,.5); font-size: 12px; letter-spacing: .22em;
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif; text-transform: uppercase;
      pointer-events: none; user-select: none;
    }
    /* 加载态 */
    #loader {
      position: fixed; inset: 0; background: #000; color: rgba(255,255,255,.5);
      display: flex; justify-content: center; align-items: center; font-size: .8rem;
      letter-spacing: .25em; font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;

{
  "imports": {
      "three": "./assets/vendor/three/three.module.min.js",
      "three/addons/": "./assets/vendor/three/addons/"
  }
}
</script>

<script type="module">
  import { initPointCloud } from './js/pointcloud.js';
  const container = document.getElementById('canvas-container');
  const loader = document.getElementById('loader');
  initPointCloud(container, {
    modelUrl: './assets/models/ys-installation.glb',
    textSymbol: '9',
    particleSize: 0.15,
    cameraZ: 18,
    onLoaded: () => loader.classList.add('hide'),
    onError: () => { loader.textContent = '加载失败'; }
  });
</script>
