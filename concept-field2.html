<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#050505">
<title>星图 v2 — 999</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display:"Cormorant Garamond","Noto Serif SC",serif;
    --font-sans:"Noto Serif SC","Cormorant Garamond",serif;
    --bg:#060606;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{font-family:var(--font-sans);color:#e8e4dc;-webkit-font-smoothing:antialiased;}

  /* 视口：全屏，拖拽平移 */
  .viewport{position:fixed;inset:0;overflow:hidden;background:
      radial-gradient(120% 90% at 30% 20%, #0d0c0a 0%, #060606 55%, #030303 100%);
      touch-action:none;cursor:grab;}
  .viewport.panning{cursor:grabbing;}

  /* 大画布：比屏幕大，整体可平移 */
  .field{position:absolute;left:0;top:0;width:2600px;height:1900px;will-change:transform;transition:filter .5s ease, opacity .5s ease;}
  .field.dimmed{filter:blur(6px) brightness(.4);opacity:.35;pointer-events:none;}

  /* 单件作品节点 */
  .node{position:absolute;left:0;top:0;will-change:transform;cursor:grab;user-select:none;}
  .node.dragging{cursor:grabbing;}
  .node img{display:block;width:100%;height:auto;
      -webkit-mask-image:radial-gradient(140% 120% at 50% 44%, #000 60%, rgba(0,0,0,0) 100%);
      mask-image:radial-gradient(140% 120% at 50% 44%, #000 60%, rgba(0,0,0,0) 100%);
      pointer-events:none;}
  .node::after{content:"";position:absolute;inset:0;pointer-events:none;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);}
  .node__cap{position:absolute;left:8px;bottom:8px;right:8px;display:flex;align-items:center;gap:7px;
      font-family:var(--font-display);font-size:12px;letter-spacing:.04em;color:rgba(232,228,220,.62);
      text-shadow:0 1px 6px rgba(0,0,0,.9);opacity:.5;transition:opacity .3s;}
  .node:hover .node__cap,.node.dragging .node__cap{opacity:1;}
  .node__dot{width:7px;height:7px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor;}

  /* 顶栏 */
  .topbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
      padding:18px 26px;z-index:60;pointer-events:none;}
  .topbar a,.topbar .hint{pointer-events:auto;}
  .topbar .logo{font-family:var(--font-display);font-size:22px;letter-spacing:.18em;color:#e8e4dc;text-decoration:none;
      text-shadow:0 0 30px rgba(0,0,0,.8);}
  .topbar .hint{font-family:var(--font-display);font-size:12.5px;letter-spacing:.14em;color:rgba(232,228,220,.4);
      text-transform:uppercase;}

  /* 系列图例 */
  .legend{position:fixed;left:22px;bottom:20px;z-index:60;display:flex;flex-direction:column;gap:6px;
      pointer-events:none;font-family:var(--font-display);}
  .legend__row{display:flex;align-items:center;gap:8px;font-size:11.5px;letter-spacing:.05em;color:rgba(232,228,220,.45);}
  .legend__dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor;}

  /* 详情浮层（复用原站图+标题+描述样式） */
  .detail{position:fixed;inset:0;z-index:80;display:none;}
  .detail.show{display:block;}
  .detail__backdrop{position:absolute;inset:0;background:rgba(3,3,3,.72);backdrop-filter:blur(2px);}
  .detail__close{position:absolute;top:20px;right:26px;width:42px;height:42px;border:1px solid rgba(232,228,220,.25);
      background:transparent;color:#e8e4dc;font-family:var(--font-display);font-size:22px;cursor:pointer;border-radius:50%;
      transition:all .3s;z-index:2;}
  .detail__close:hover{background:rgba(232,228,220,.08);border-color:rgba(232,228,220,.5);}
  .detail__panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:min(1040px,92vw);max-height:86vh;display:flex;gap:34px;align-items:center;
      padding:34px;overflow:auto;}
  .detail__imgwrap{flex:1 1 58%;display:flex;justify-content:center;align-items:center;min-width:0;}
  .detail__imgwrap img{max-width:100%;max-height:74vh;width:auto;height:auto;object-fit:contain;
      box-shadow:0 30px 90px rgba(0,0,0,.7);}
  .detail__meta{flex:1 1 42%;min-width:0;}
  .detail__series{font-family:var(--font-display);font-size:12px;letter-spacing:.28em;text-transform:uppercase;
      color:rgba(232,228,220,.45);margin-bottom:14px;}
  .detail__name{font-family:var(--font-display);font-weight:500;font-size:clamp(22px,3vw,34px);line-height:1.15;
      color:#f2efe8;margin-bottom:20px;}
  .detail__desc{font-family:var(--font-sans);font-weight:300;font-size:14.5px;line-height:1.95;color:rgba(232,228,220,.78);}
  @media (max-width:760px){
    .detail__panel{flex-direction:column;gap:20px;padding:24px;}
    .detail__imgwrap img{max-height:46vh;}
    .topbar .hint{display:none;}
  }
</style>
</head>
<body>

<div class="viewport" id="viewport">
  <div class="field" id="field"></div>
</div>

<div class="topbar">
  <a class="logo" href="index.html">999</a>
  <div class="hint">拖动画布平移 · 拖动作品移动 · 点击查看</div>
</div>

<div class="legend" id="legend"></div>

<div class="detail" id="detail">
  <div class="detail__backdrop" data-close></div>
  <button class="detail__close" data-close aria-label="关闭">&times;</button>
  <div class="detail__panel">
    <div class="detail__imgwrap"><img loading="lazy" id="detailImg" src="" alt=""></div>
    <div class="detail__meta">
      <div class="detail__series" id="detailSeries"></div>
      <h2 class="detail__name" id="detailName"></h2>
      <p class="detail__desc" id="detailDesc"></p>
    </div>
  </div>
</div>

<script>
/* ===== 数据：20 件（除模型展厅的无名之手），真实路径 / 描述取自 portfolio.html ===== */
const SERIES = {

const HEAVY = new Set([
  "百合花白马 · 亮面丝绸（主版）","Manus Multiplex","菩萨 · 流体解构","无题 · 哥特的余烬","无题 · 红框解构"

const WORKS = [
  {s:"01",name:"百合花白马 · 亮面丝绸（主版）",img:"assets/images/百合花白马最新800MM焦距png亮面丝绸(1).png",w:"heavy",

  {s:"01",name:"百合花白马 · 反转色变体",img:"assets/images/field-webp/百合花白马最新800MM焦距png反转色.webp",w:"normal",
   d:"同一构图的负片/反转色版本。移除了红色球体，整体色调偏青蓝冷调，金色纹样转为暗沉的青铜质感。通过色彩反转探索同一形态在不同光谱下的存在方式。"},
  {s:"01",name:"百合花白马 · 唱片封套",img:"assets/images/field-webp/IMG_20260405_190808.webp",w:"normal",
   d:"将主版构图重新编排为黑胶唱片封面的形式语言：圆形裁切区域展示核心图像，下方留白并附以模拟音乐播放器的UI控件。控件为纯视觉装饰元素，探讨数字艺术在模拟媒介中的再语境化可能。"},
  {s:"01",name:"百合花白马 · 六格变体矩阵",img:"assets/images/field-webp/retouch_2025110112445302.webp",w:"light",
   d:"以2×3矩阵展示同一白马+百合构图在不同后期处理下的六种面貌：金色原版、高对比暗调、灰阶反转、低饱和冷色、故障艺术色偏、以及红蓝双色调分离。每一格都是同一物在不同感知滤镜下的分身。"},
  {s:"02",name:"Bàn tay · Chín cách nhìn",img:"assets/images/field-webp/MEITU_20251231_172505115.webp",w:"normal",

  {s:"02",name:"Manus Multiplex",img:"assets/images/field-webp/MEITU_20251231_192537304.webp",w:"heavy",

  {s:"02",name:"指纹里流淌的二进制河",img:"assets/images/field-webp/IMG_1861.webp",w:"normal",

  {s:"03",name:"菩萨 · 流体解构",img:"assets/images/field-webp/菩萨.webp",w:"heavy",

  {s:"03",name:"无题 · 头巾波纹",img:"assets/images/field-webp/Screenshot_2025-10-18-20-24-08-95_99c04817c0de5652397fc8b56c3b3817.webp",w:"normal",
   d:"红色的圆形光环笼罩着人物头部，蓝色的衣袍布满水波般的扭曲纹理，边缘带有明显的数字故障/扫描线效果。面部表情平静到近乎空洞，在强烈的红蓝色彩冲突中保持奇异的疏离感。黑色背景使人物悬浮于虚空之中。"},

   d:"一位苍白到近乎瓷质的人物侧影，长发呈深蓝色如水流般倾泻而下。半透明的薄纱覆在面上，使五官若隐若现。下颌与颈侧生长出红色的多面晶体结构，肩下迸发出锋利的蓝色冰晶碎块。一条细红线横贯眼部附近。冷蓝主调中被零星的红色不断刺穿。"},
  {s:"03",name:"无题 · 红色熔炉",img:"assets/images/field-webp/新.webp",w:"light",
   d:"整个画面被浸入单色的红色之中——炽热、几乎具有温度的熔岩红。多个面孔在红色的浑浊中浮现又淹没：中央一张清晰的脸孔向上凝视，左侧一张侧脸在边缘处崩解，右下角另一张面容正从液态中艰难挣脱。表面布满龟裂纹路，深色流体从裂隙中向下滴落。"},
  {s:"04",name:"无题 · 蓝色植物",img:"assets/images/field-webp/蓝色流体植物.webp",w:"normal",
   d:"群青色深处，纵向笔触如帘幕垂落。中央一株白青色的形态向上舒展，状如棕榈，又如某种深海植物的荧光躯体。笔触厚实而富有方向感，白色形体在幽暗中自行发光。接近丙烯倾倒技法——让颜料自己决定去向。"},
  {s:"04",name:"无题 · 流体飞鸟",img:"assets/images/field-webp/retouch_2024032121030193.webp",w:"light",
   d:"一只蜂鸟通体呈现青蓝-绿松石的液态金属光泽，悬停于画面中央。周围是粉、珊瑚橙、乳白、淡蓝交织而成的流体漩涡。鸟身本身由与其环境相同的物质构成，图形与背景共享同一种存在状态，所谓的鸟不过是永恒流动中一次短暂的凝聚。"},
  {s:"05",name:"五联 · 抽象流体雕塑",img:"assets/images/field-webp/IMG_20260405_190358.webp",w:"normal",
   d:"五幅3D渲染的抽象流体形态组合：冰蓝色半透明有机体、银白金属质感雕塑、黑白高对比版本、线框结构图、浅色柔和版。一条贯穿画面的红色斜线像伤口一样切开所有形态，暗示破坏性力量在完美造物中的必然在场。"},
  {s:"05",name:"无题 · 哥特的余烬",img:"assets/images/field-webp/IMG_20260210_090302.webp",w:"heavy",
   d:"一个哥特式教堂内部的空间叙事：天使雕像高举火炬立于穹顶之下，两侧科林斯柱支撑着拱券，前景是一座华丽的巴洛克钟柜。整个场景浸透在大面积红色光晕之中，如同一场永不熄灭的火灾，或某种仪式性的血光照明。"},
  {s:"06",name:"KINO · 冬之枯木与白发",img:"assets/images/field-webp/MEITU_20260307_192450919.webp",w:"normal",
   d:"一位黑皮肤、白发的女性侧影，置身于雨雪交织的灰蓝色调中。画面下方和肩部生长出白色的枯枝状结构，如同冬天里冻僵的树干从身体内部穿透而出。整体笼罩在电影海报式的排版语言中，虚构了一部关于寒冷、枯萎与静默生存的电影剧照。"},
  {s:"06",name:"L'Arborescence sous la Neige",img:"assets/images/field-webp/MEITU_20260307_191145286.webp",w:"light",
   d:"一片以覆雪枯木为基底的冬日剧场。纵向长卷中，繁复交错的无叶枝影互相渗透，在灰白雾气中渐渐化为人形。银白色长发顺着画幅倾泻而下，仿如正在堆积的雪层。远景的几只飞鸟、近处一两朵素白小花，是严寒秩序中唯一温热的呼吸。"},
  {s:"07",name:"羊羊眼 · 彩色线条凝视",img:"assets/images/field-webp/羊羊眼www.webp",w:"normal",
   d:"对一只眼睛的极端放大与线描重构。眼球被分解为数千条纤细的彩色线条——红橙黄绿青蓝，每一根都是一次单独的描摹轨迹，共同编织出虹膜与睫毛建立的复杂拓扑结构。观看的对象反过来凝视着观看者。"},
  {s:"07",name:"无题 · 红框解构",img:"assets/images/field-webp/重修8.webp",w:"heavy",
   d:"一只青蓝色的线描眼球，虹膜每一道褶皱与睫毛走向被忠实还原，瞳孔深处嵌套无数层叠的小眼。眼眶四周被大小不一的红色矩形选框框定，注以活着、囚困、是他还是我等字样。临床的观看工具语言与极度私密的注视对象之间形成根本张力。"}
];

/* ===== 工具 ===== */
function randn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

const FIELD_W=2600, FIELD_H=1900, SPREAD=240;
const field=document.getElementById('field');
const viewport=document.getElementById('viewport');
const nodes=[];

WORKS.forEach(w=>{
  const s=SERIES[w.s];
  const isHeavy=HEAVY.has(w.name);
  const baseW = isHeavy?440 : (w.w==='light'?200:300);
  const ax=s.anchor[0], ay=s.anchor[1];
  let bx=clamp(ax + randn()*SPREAD, 40, FIELD_W-baseW-40);
  let by=clamp(ay + randn()*SPREAD, 40, FIELD_H-260);
  const z = isHeavy ? (0.82+Math.random()*0.18) : Math.random()*0.78;
  const depthScale = 0.82 + z*0.5;
  const blur = isHeavy?0:(1-z)*4.2;
  const opacity = 0.6 + z*0.4;
  const baseZ = Math.round(z*100) + (isHeavy?2000:0);

  const el=document.createElement('div');
  el.className='node';
  el.style.width=baseW+'px';
  el.style.opacity=opacity;
  el.style.zIndex=baseZ;
  el.style.filter = blur>0 ? `blur(${blur.toFixed(2)}px)` : 'none';
  el.innerHTML=`<img loading="lazy" src="${w.img}" alt="${w.name}" decoding="async">
    <div class="node__cap"><span class="node__dot" style="color:${s.color};background:${s.color}"></span>${w.name}</div>`;
  field.appendChild(el);

  const node={el,work:w,series:s,bx,by,bw:baseW,bh:200,
    z,depthScale,baseZ,
    amp:26+Math.random()*24,
    spd:9000+Math.random()*8000,
    spd2:10000+Math.random()*8000,
    ph:Math.random()*Math.PI*2,
    ph2:Math.random()*Math.PI*2};
  el._node=node;

  const img=el.querySelector('img');
  img.addEventListener('load',()=>{ node.bh=img.clientHeight||200; });
  nodes.push(node);
});

/* 图例 */
const legend=document.getElementById('legend');
Object.keys(SERIES).forEach(k=>{
  const s=SERIES[k];
  const row=document.createElement('div');
  row.className='legend__row';
  row.innerHTML=`<span class="legend__dot" style="color:${s.color};background:${s.color}"></span>${k} — ${s.name}`;
  legend.appendChild(row);
});

/* ===== 平移 + 视差 ===== */
let panX=-200, panY=-120;
let minPanX=0,minPanY=0,maxPanX=0,maxPanY=0;
function recalcPan(){
  const vw=window.innerWidth, vh=window.innerHeight;
  minPanX=Math.min(0, vw-FIELD_W);
  minPanY=Math.min(0, vh-FIELD_H);
  maxPanX=0; maxPanY=0;
  panX=clamp(panX,minPanX,maxPanX);
  panY=clamp(panY,minPanY,maxPanY);
}
recalcPan();
window.addEventListener('resize',recalcPan);

let parTX=0,parTY=0,parX=0,parY=0;

/* ===== 交互：拖节点 / 平移画布 ===== */
let mode=null, dragNode=null, startX=0,startY=0, origBX=0,origBY=0, panSX=0,panSY=0, moved=false;
viewport.addEventListener('pointerdown',e=>{
  if(detailOpen) return;
  const nodeEl=e.target.closest('.node');
  if(nodeEl){
    mode='node'; dragNode=nodeEl._node;
    origBX=dragNode.bx; origBY=dragNode.by;
    nodeEl.setPointerCapture(e.pointerId);
    nodeEl.classList.add('dragging');
    nodeEl.style.zIndex=99999;
    nodeEl.style.filter='none';
  } else {
    mode='pan'; panSX=panX; panSY=panY;
    viewport.classList.add('panning');
  }
  startX=e.clientX; startY=e.clientY; moved=false;
});
viewport.addEventListener('pointermove',e=>{
  if(!mode){
    const nx=(e.clientX/window.innerWidth-0.5);
    const ny=(e.clientY/window.innerHeight-0.5);
    parTX=nx*26; parTY=ny*26;
    return;
  }
  const dx=e.clientX-startX, dy=e.clientY-startY;
  if(Math.abs(dx)+Math.abs(dy)>5) moved=true;
  if(mode==='node' && dragNode){
    dragNode.bx=clamp(origBX+dx,0,FIELD_W-dragNode.bw);
    dragNode.by=clamp(origBY+dy,0,FIELD_H-dragNode.bh);
  } else if(mode==='pan'){
    panX=clamp(panSX+dx,minPanX,maxPanX);
    panY=clamp(panSY+dy,minPanY,maxPanY);
  }
});
function endPointer(){
  if(mode==='node' && dragNode){
    dragNode.el.classList.remove('dragging');
    dragNode.el.style.zIndex=dragNode.baseZ;
    const blur=dragNode.z<0.82 ? (1-dragNode.z)*4.2 : 0;
    dragNode.el.style.filter = blur>0 ? `blur(${blur.toFixed(2)}px)` : 'none';
    if(!moved) openDetail(dragNode.work);
    dragNode=null;
  }
  mode=null; viewport.classList.remove('panning');
}
viewport.addEventListener('pointerup',endPointer);
viewport.addEventListener('pointercancel',endPointer);

/* ===== 详情浮层（复用原站样式） ===== */
const detail=document.getElementById('detail');
const detailImg=document.getElementById('detailImg');
const detailSeries=document.getElementById('detailSeries');
const detailName=document.getElementById('detailName');
const detailDesc=document.getElementById('detailDesc');
let detailOpen=false;
function openDetail(w){
  const s=SERIES[w.s];
  detailImg.src=w.img; detailImg.alt=w.name;
  detailSeries.textContent=`${w.s} — ${s.name}`;
  detailName.textContent=w.name;
  detailDesc.textContent=w.d;
  detail.classList.add('show'); detailOpen=true;
  field.classList.add('dimmed');
}
function closeDetail(){
  detail.classList.remove('show'); detailOpen=false;
  field.classList.remove('dimmed');
}
detail.addEventListener('click',e=>{ if(e.target.hasAttribute('data-close')) closeDetail(); });
window.addEventListener('keydown',e=>{ if(e.key==='Escape'&&detailOpen) closeDetail(); });

/* ===== 动画循环：浮动 + 平移 + 视差 ===== */
function tick(t){
  for(const n of nodes){
    const dx=Math.sin(t/n.spd + n.ph)*n.amp;
    const dy=Math.cos(t/n.spd2 + n.ph2)*n.amp*0.7;
    const rot=Math.sin(t/n.spd + n.ph)*1.4;
    n.el.style.transform=`translate(${(n.bx+dx).toFixed(1)}px, ${(n.by+dy).toFixed(1)}px) scale(${n.depthScale}) rotate(${rot.toFixed(2)}deg)`;
  }
  parX+=(parTX-parX)*0.05; parY+=(parTY-parY)*0.05;
  if(!detailOpen) field.style.transform=`translate(${(panX+parX).toFixed(1)}px, ${(panY+parY).toFixed(1)}px)`;
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
