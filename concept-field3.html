<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#050505">
<title>星图 v3 — 999</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --font-display:"Cormorant Garamond","Noto Serif SC",serif; --font-sans:"Noto Serif SC","Cormorant Garamond",serif; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:#070707;color:#e8e4dc;}
  body{font-family:var(--font-sans);-webkit-font-smoothing:antialiased;}

  .stage{position:fixed;inset:0;overflow:hidden;background:
      radial-gradient(130% 100% at 50% 30%, #100f0d 0%, #070707 60%, #040404 100%);}
  /* 极轻的环境色雾，软化死黑 */
  .ambient{position:absolute;border-radius:50%;filter:blur(90px);opacity:.10;pointer-events:none;}

  .field{position:absolute;inset:0;}

  .node{position:absolute;left:0;top:0;will-change:transform;cursor:grab;user-select:none;}
  .node.dragging{cursor:grabbing;}
  .node img{display:block;width:100%;height:auto;
      -webkit-mask-image:radial-gradient(140% 122% at 50% 44%, #000 60%, rgba(0,0,0,0) 100%);
      mask-image:radial-gradient(140% 122% at 50% 44%, #000 60%, rgba(0,0,0,0) 100%);
      pointer-events:none;}
  .node__cap{position:absolute;left:8px;bottom:6px;right:8px;display:flex;align-items:center;gap:7px;
      font-family:var(--font-display);font-size:11.5px;letter-spacing:.03em;color:rgba(232,228,220,.6);
      text-shadow:0 1px 6px rgba(0,0,0,.9);opacity:.42;transition:opacity .3s;}
  .node:hover .node__cap,.node.dragging .node__cap{opacity:1;}
  .node__dot{width:6px;height:6px;border-radius:50%;flex:none;box-shadow:0 0 7px currentColor;}

  .topbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
      padding:18px 26px;z-index:60;pointer-events:none;}
  .topbar a,.topbar .hint{pointer-events:auto;}
  .topbar .logo{font-family:var(--font-display);font-size:22px;letter-spacing:.18em;color:#e8e4dc;text-decoration:none;
      text-shadow:0 0 30px rgba(0,0,0,.8);}
  .topbar .hint{font-family:var(--font-display);font-size:12.5px;letter-spacing:.14em;color:rgba(232,228,220,.4);text-transform:uppercase;}

  .detail{position:fixed;inset:0;z-index:80;display:none;}
  .detail.show{display:block;}
  .detail__backdrop{position:absolute;inset:0;background:rgba(3,3,3,.72);backdrop-filter:blur(2px);}
  .detail__close{position:absolute;top:20px;right:26px;width:42px;height:42px;border:1px solid rgba(232,228,220,.25);
      background:transparent;color:#e8e4dc;font-family:var(--font-display);font-size:22px;cursor:pointer;border-radius:50%;transition:all .3s;z-index:2;}
  .detail__close:hover{background:rgba(232,228,220,.08);border-color:rgba(232,228,220,.5);}
  .detail__panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:min(1040px,92vw);max-height:86vh;display:flex;gap:34px;align-items:center;padding:34px;overflow:auto;}
  .detail__imgwrap{flex:1 1 58%;display:flex;justify-content:center;align-items:center;min-width:0;}
  .detail__imgwrap img{max-width:100%;max-height:74vh;width:auto;height:auto;object-fit:contain;box-shadow:0 30px 90px rgba(0,0,0,.7);}
  .detail__meta{flex:1 1 42%;min-width:0;}
  .detail__series{font-family:var(--font-display);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:rgba(232,228,220,.45);margin-bottom:14px;}
  .detail__name{font-family:var(--font-display);font-weight:500;font-size:clamp(22px,3vw,34px);line-height:1.15;color:#f2efe8;margin-bottom:20px;}
  .detail__desc{font-family:var(--font-sans);font-weight:300;font-size:14.5px;line-height:1.95;color:rgba(232,228,220,.78);}
  @media (max-width:760px){ .detail__panel{flex-direction:column;gap:20px;padding:24px;} .detail__imgwrap img{max-height:46vh;} .topbar .hint{display:none;} }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="ambient" style="width:46vmax;height:46vmax;left:-6vmax;top:36vmax;background:#3a2c12;"></div>
  <div class="ambient" style="width:40vmax;height:40vmax;right:-4vmax;top:-6vmax;background:#10243a;"></div>
  <div class="ambient" style="width:38vmax;height:38vmax;right:6vmax;bottom:-8vmax;background:#2a1230;"></div>
  <div class="field" id="field"></div>
</div>

<div class="topbar">
  <a class="logo" href="index.html">999</a>
  <div class="hint">拖动作品 · 点击查看</div>
</div>

<div class="detail" id="detail">
  <div class="detail__backdrop" data-close></div>
  <button class="detail__close" data-close aria-label="关闭">&times;</button>
  <div class="detail__panel">
    <div class="detail__imgwrap"><img loading="lazy" id="detailImg" src="" alt=""></div>
    <div class="detail__meta">
      <div class="detail__series" id="detailSeries"></div>
      <h2 class="detail__name" id="detailName"></h2>
      <p class="detail__desc" id="detailDesc"></p>
    </div>
  </div>
</div>

<script>
const SERIES = {
  "01":{name:"百合花白马系列",     color:"#d9b36b"},
  "02":{name:"身体研究与手的变体", color:"#c65b5b"},
  "03":{name:"流体肖像与解构人像", color:"#5b7bc6"},
  "04":{name:"抽象流体绘画",       color:"#5bbfc6"},
  "05":{name:"抽象3D与建筑空间",   color:"#9b6bc6"},
  "06":{name:"电影感与长卷肖像",   color:"#cfcabc"},
  "07":{name:"感知边界实验",       color:"#6bc67b"}
};
const HEAVY = new Set(["百合花白马 · 亮面丝绸（主版）","Manus Multiplex","菩萨 · 流体解构","无题 · 哥特的余烬","无题 · 红框解构"]);

/* 错落有序：主脉(左下→右上)串联 7 系列微簇；x/y 为视口百分比(中心)，rot 为微旋 */
const WORKS = [
  {s:"01",name:"百合花白马 · 亮面丝绸（主版）",img:"assets/images/field-webp/百合花白马最新800MM焦距png亮面丝绸(1).webp",tier:"heavy",x:30,y:56,rot:-3,
   d:"核心作品。以3D建模塑造一匹通体银白、表面如亮面丝绸般反光的白马，鬃毛处绽放一朵鎏金质感的百合花。马身侧面融入克林姆特式的金色螺旋与几何装饰纹样，脚下铺设红蓝交织的透视网格地面，一枚正红球体悬浮于画面右侧，形成冷暖对撞的视觉锚点。"},
  {s:"01",name:"百合花白马 · 反转色变体",img:"assets/images/field-webp/百合花白马最新800MM焦距png反转色.webp",tier:"normal",x:42,y:67,rot:2,
   d:"同一构图的负片/反转色版本。移除了红色球体，整体色调偏青蓝冷调，金色纹样转为暗沉的青铜质感。通过色彩反转探索同一形态在不同光谱下的存在方式。"},
  {s:"01",name:"百合花白马 · 唱片封套",img:"assets/images/field-webp/IMG_20260405_190808.webp",tier:"normal",x:21,y:73,rot:4,
   d:"将主版构图重新编排为黑胶唱片封面的形式语言：圆形裁切区域展示核心图像，下方留白并附以模拟音乐播放器的UI控件。控件为纯视觉装饰元素，探讨数字艺术在模拟媒介中的再语境化可能。"},
  {s:"01",name:"百合花白马 · 六格变体矩阵",img:"assets/images/field-webp/retouch_2025110112445302.webp",tier:"light",x:48,y:50,rot:-2,
   d:"以2×3矩阵展示同一白马+百合构图在不同后期处理下的六种面貌：金色原版、高对比暗调、灰阶反转、低饱和冷色、故障艺术色偏、以及红蓝双色调分离。每一格都是同一物在不同感知滤镜下的分身。"},

  {s:"02",name:"Bàn tay · Chín cách nhìn",img:"assets/images/field-webp/MEITU_20251231_172505115.webp",tier:"normal",x:14,y:42,rot:3,
   d:"同一只手，九种视觉语法并行：红宝石质地、红外暗涌、X光、热成像、水雾、点阵、光影、液态、紫外。以九种材质探索手的视觉语法。"},
  {s:"02",name:"手 · 3D材质雕刻",img:"assets/images/field-webp/retouch_2025110112454483.webp",tier:"normal",x:25,y:31,rot:-4,
   d:"将手的形态通过3D雕刻赋予多种矛盾的物质属性：风化石质、玻璃态、文字点阵构成、RGB通道分离的彩色故障态、金属铜绿与冰霜结晶。以ZBrush数字黏土完成的材质实验，探索同一形态如何在异质材料中保持身份。"},
  {s:"02",name:"Manus Multiplex",img:"assets/images/field-webp/MEITU_20251231_192537304.webp",tier:"heavy",x:37,y:41,rot:2,
   d:"雾中红丝绒宝石掌——为肉身本源。多格分列不同物质维度的手：热成像的灼热温度、透光的光刻肌理、字符堆砌的数字虚拟躯体、撞色霓虹的感知轮廓。血肉实体、情绪体温、数字分身被拆解重组。手是人与万物的触点。"},
  {s:"02",name:"指纹里流淌的二进制河",img:"assets/images/field-webp/IMG_1861.webp",tier:"normal",x:31,y:17,rot:-2,
   d:"回车键长出甲骨文的裂纹，光缆在指节间织网时，所有代码突然生出脊椎骨。以 Cinema 4D 完成主体形态与材质参数化设计，通过 MoGraph 驱动字符粒子沿手指轮廓流动，Octane 渲染玻璃质感与光晕。当最古老的指纹纹路与最当代的代码流并行于同一只手，身体便成为所有媒介的母体。"},

  {s:"03",name:"菩萨 · 流体解构",img:"assets/images/field-webp/菩萨.webp",tier:"heavy",x:16,y:13,rot:3,
   d:"人物以纯黑色剪影呈现，轮廓清晰而面容模糊，身上覆盖大面积的红蓝流体颜料泼溅与渗洇效果。背景是白色基底上叠加的淡雅水彩纹理。菩萨之名在此并非宗教指涉，而是借用神圣意象来反衬数字时代肖像的破碎与重组。"},
  {s:"03",name:"无题 · 头巾波纹",img:"assets/images/field-webp/Screenshot_2025-10-18-20-24-08-95_99c04817c0de5652397fc8b56c3b3817.webp",tier:"normal",x:31,y:8,rot:-3,
   d:"红色的圆形光环笼罩着人物头部，蓝色的衣袍布满水波般的扭曲纹理，边缘带有明显的数字故障/扫描线效果。面部表情平静到近乎空洞，在强烈的红蓝色彩冲突中保持奇异的疏离感。黑色背景使人物悬浮于虚空之中。"},
  {s:"03",name:"无题 · 蓝发晶体",img:"assets/images/field-webp/retouch_2025081414350095.webp",tier:"normal",x:10,y:23,rot:2,
   d:"一位苍白到近乎瓷质的人物侧影，长发呈深蓝色如水流般倾泻而下。半透明的薄纱覆在面上，使五官若隐若现。下颌与颈侧生长出红色的多面晶体结构，肩下迸发出锋利的蓝色冰晶碎块。一条细红线横贯眼部附近。冷蓝主调中被零星的红色不断刺穿。"},
  {s:"03",name:"无题 · 红色熔炉",img:"assets/images/field-webp/新.webp",tier:"light",x:23,y:2,rot:-1,
   d:"整个画面被浸入单色的红色之中——炽热、几乎具有温度的熔岩红。多个面孔在红色的浑浊中浮现又淹没：中央一张清晰的脸孔向上凝视，左侧一张侧脸在边缘处崩解，右下角另一张面容正从液态中艰难挣脱。表面布满龟裂纹路，深色流体从裂隙中向下滴落。"},

  {s:"04",name:"无题 · 蓝色植物",img:"assets/images/field-webp/蓝色流体植物.webp",tier:"normal",x:53,y:37,rot:2,
   d:"群青色深处，纵向笔触如帘幕垂落。中央一株白青色的形态向上舒展，状如棕榈，又如某种深海植物的荧光躯体。笔触厚实而富有方向感，白色形体在幽暗中自行发光。接近丙烯倾倒技法——让颜料自己决定去向。"},
  {s:"04",name:"无题 · 流体飞鸟",img:"assets/images/field-webp/retouch_2024032121030193.webp",tier:"light",x:59,y:25,rot:-3,
   d:"一只蜂鸟通体呈现青蓝-绿松石的液态金属光泽，悬停于画面中央。周围是粉、珊瑚橙、乳白、淡蓝交织而成的流体漩涡。鸟身本身由与其环境相同的物质构成，图形与背景共享同一种存在状态，所谓的鸟不过是永恒流动中一次短暂的凝聚。"},

  {s:"05",name:"五联 · 抽象流体雕塑",img:"assets/images/field-webp/IMG_20260405_190358.webp",tier:"normal",x:51,y:62,rot:-2,
   d:"五幅3D渲染的抽象流体形态组合：冰蓝色半透明有机体、银白金属质感雕塑、黑白高对比版本、线框结构图、浅色柔和版。一条贯穿画面的红色斜线像伤口一样切开所有形态，暗示破坏性力量在完美造物中的必然在场。"},
  {s:"05",name:"无题 · 哥特的余烬",img:"assets/images/field-webp/IMG_20260210_090302.webp",tier:"heavy",x:65,y:53,rot:3,
   d:"一个哥特式教堂内部的空间叙事：天使雕像高举火炬立于穹顶之下，两侧科林斯柱支撑着拱券，前景是一座华丽的巴洛克钟柜。整个场景浸透在大面积红色光晕之中，如同一场永不熄灭的火灾，或某种仪式性的血光照明。"},

  {s:"06",name:"KINO · 冬之枯木与白发",img:"assets/images/field-webp/MEITU_20260307_192450919.webp",tier:"normal",x:77,y:41,rot:-3,
   d:"一位黑皮肤、白发的女性侧影，置身于雨雪交织的灰蓝色调中。画面下方和肩部生长出白色的枯枝状结构，如同冬天里冻僵的树干从身体内部穿透而出。整体笼罩在电影海报式的排版语言中，虚构了一部关于寒冷、枯萎与静默生存的电影剧照。"},
  {s:"06",name:"L'Arborescence sous la Neige",img:"assets/images/field-webp/MEITU_20260307_191145286.webp",tier:"light",x:85,y:29,rot:2,
   d:"一片以覆雪枯木为基底的冬日剧场。纵向长卷中，繁复交错的无叶枝影互相渗透，在灰白雾气中渐渐化为人形。银白色长发顺着画幅倾泻而下，仿如正在堆积的雪层。远景的几只飞鸟、近处一两朵素白小花，是严寒秩序中唯一温热的呼吸。"},

  {s:"07",name:"羊羊眼 · 彩色线条凝视",img:"assets/images/field-webp/羊羊眼www.webp",tier:"normal",x:71,y:73,rot:3,
   d:"对一只眼睛的极端放大与线描重构。眼球被分解为数千条纤细的彩色线条——红橙黄绿青蓝，每一根都是一次单独的描摹轨迹，共同编织出虹膜与睫毛建立的复杂拓扑结构。观看的对象反过来凝视着观看者。"},
  {s:"07",name:"无题 · 红框解构",img:"assets/images/field-webp/重修8.webp",tier:"heavy",x:87,y:61,rot:-2,
   d:"一只青蓝色的线描眼球，虹膜每一道褶皱与睫毛走向被忠实还原，瞳孔深处嵌套无数层叠的小眼。眼眶四周被大小不一的红色矩形选框框定，注以活着、囚困、是他还是我等字样。临床的观看工具语言与极度私密的注视对象之间形成根本张力。"}
];

const TIER_W = {heavy:"30vmin", normal:"18vmin", light:"12vmin"};

const field=document.getElementById('field');
const stage=document.getElementById('stage');
const nodes=[];

WORKS.forEach(w=>{
  const s=SERIES[w.s];
  const isHeavy=(w.tier==='heavy');
  // 距离感：nearness 主由 tier 决定，仅极轻随机
  const n = isHeavy ? (0.9+Math.random()*0.1) : (w.tier==='light' ? (0.3+Math.random()*0.12) : (0.55+Math.random()*0.18));
  const depthScale = 0.82 + n*0.4;            // 0.82 ~ 1.22
  const blur = n<0.5 ? ((0.5-n)*3).toFixed(2) : 0;  // 最远 ≤1.5px
  const opacity = (0.9 + n*0.1).toFixed(3);  // 0.9 ~ 1.0（极小差）
  const zIndex = isHeavy ? 1000+Math.round(n*50) : Math.round(n*200);

  const el=document.createElement('div');
  el.className='node';
  el.style.width=TIER_W[w.tier];
  el.style.opacity=opacity;
  el.style.zIndex=zIndex;
  el.style.filter = blur>0 ? `blur(${blur}px)` : 'none';
  el.innerHTML=`<img loading="lazy" src="${w.img}" alt="${w.name}" decoding="async">
    <div class="node__cap"><span class="node__dot" style="color:${s.color};background:${s.color}"></span>${w.name}</div>`;
  field.appendChild(el);

  const node={el,work:w,
    x:w.x, y:w.y, rot:w.rot,
    depthScale, baseZ:zIndex,
    w:0, h:200,
    cx:0, cy:0,            // 当前显示中心(px)
    tx:0, ty:0,            // 拖拽目标(px)
    dragging:false,
    lift:1, liftTarget:1,  // Apple 式抬起
    amp:8+Math.random()*10,
    spd:7000+Math.random()*6000,
    spd2:8000+Math.random()*6000,
    ph:Math.random()*Math.PI*2,
    ph2:Math.random()*Math.PI*2};
  el._node=node;
  const img=el.querySelector('img');
  img.addEventListener('load',()=>{ node.h=img.clientHeight||200; node.w=img.clientWidth||el.offsetWidth; });
  nodes.push(node);
});

function vw(){return window.innerWidth;}
function vh(){return window.innerHeight;}

/* ===== 交互：拖拽(抬起+跟手+弹回) / 点击详情 ===== */
let detailOpen=false;
let active=null, startX=0,startY=0, downX=0,downY=0, moved=false;

nodes.forEach(node=>{
  const el=node.el;
  el.addEventListener('pointerdown',e=>{
    if(detailOpen) return;
    e.stopPropagation();
    active=node; el.setPointerCapture(e.pointerId);
    el.classList.add('dragging');
    node.dragging=true; node.liftTarget=1.1;
    const r=el.getBoundingClientRect();
    node.cx=r.left+r.width/2; node.cy=r.top+r.height/2;
    node.tx=node.cx; node.ty=node.cy;
    startX=downX=e.clientX; startY=downY=e.clientY; moved=false;
  });
  el.addEventListener('pointermove',e=>{
    if(active!==node) return;
    const dx=e.clientX-downX, dy=e.clientY-downY;
    if(Math.abs(e.clientX-startX)+Math.abs(e.clientY-startY)>6) moved=true;
    // 跟手（以指针位移驱动中心）
    node.tx += dx; node.ty += dy;
    downX=e.clientX; downY=e.clientY;
  });
  el.addEventListener('pointerup',e=>{
    if(active!==node) return;
    el.classList.remove('dragging');
    node.dragging=false; node.liftTarget=1;
    el.style.zIndex=node.baseZ;
    // 落点写回百分比，之后围绕新位置继续浮动
    node.x = clamp(node.cx/vw()*100, 6, 94);
    node.y = clamp(node.cy/vh()*100, 4, 96);
    if(!moved) openDetail(node.work);
    active=null;
  });
});
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

/* 点击空白处不做事（无平移）；ESC 关详情 */
window.addEventListener('keydown',e=>{ if(e.key==='Escape'&&detailOpen) closeDetail(); });

/* ===== 详情浮层 ===== */
const detail=document.getElementById('detail');
const detailImg=document.getElementById('detailImg');
const detailSeries=document.getElementById('detailSeries');
const detailName=document.getElementById('detailName');
const detailDesc=document.getElementById('detailDesc');
function openDetail(w){
  const s=SERIES[w.s];
  detailImg.src=w.img; detailImg.alt=w.name;
  detailSeries.textContent=`${w.s} — ${s.name}`;
  detailName.textContent=w.name; detailDesc.textContent=w.d;
  detail.classList.add('show'); detailOpen=true;
}
function closeDetail(){ detail.classList.remove('show'); detailOpen=false; }
detail.addEventListener('click',e=>{ if(e.target.hasAttribute('data-close')) closeDetail(); });

/* ===== 动画循环：错落浮动 + 跟手缓动 + 抬起弹回 ===== */
function tick(t){
  const W=vw(), H=vh();
  for(const node of nodes){
    // 基准中心（含收敛幅度浮动）
    const baseX = node.x/100*W + Math.sin(t/node.spd + node.ph)*node.amp;
    const baseY = node.y/100*H + Math.cos(t/node.spd2 + node.ph2)*node.amp*0.6;
    if(node.dragging){
      node.cx += (node.tx-node.cx)*0.32;   // 跟手缓动
      node.cy += (node.ty-node.cy)*0.32;
    } else {
      node.cx += (baseX-node.cx)*0.08;      // 弹回新基准
      node.cy += (baseY-node.cy)*0.08;
    }
    node.lift += (node.liftTarget-node.lift)*0.18;
    const wob = Math.sin(t/node.spd + node.ph)*0.6;   // 极轻呼吸
    const sc = node.depthScale * node.lift;
    node.el.style.transform =
      `translate(${(node.cx - node.w/2).toFixed(1)}px, ${(node.cy - node.h/2).toFixed(1)}px) scale(${sc.toFixed(3)}) rotate(${(node.rot+wob).toFixed(2)}deg)`;
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* resize：刷新尺寸缓存 */
window.addEventListener('resize',()=>{
  nodes.forEach(n=>{ if(n.el.offsetWidth) n.w=n.el.offsetWidth; });
});
</script>
